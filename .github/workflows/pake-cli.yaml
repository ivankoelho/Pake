name: Build App With Pake CLI

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform"
        required: true
        default: "macos-latest"
        type: choice
        options:
          - "windows-latest"
          - "macos-latest"
          - "ubuntu-24.04"
      url:
        description: "Website URL"
        required: true
      name:
        description: "App name (lowercase for Linux)"
        required: true
      icon:
        description: "Icon URL, auto-fetch if empty"
        required: false
      width:
        description: "Window width (px)"
        required: false
        default: "1200"
      height:
        description: "Window height (px)"
        required: false
        default: "780"
      min_width:
        description: "Minimum window width (px)"
        required: false
      min_height:
        description: "Minimum window height (px)"
        required: false
      app_version:
        description: "App version"
        required: false
        default: "1.0.0"
      fullscreen:
        description: "Start in fullscreen mode"
        required: false
        type: boolean
        default: false
      hide_title_bar:
        description: "Hide title bar (macOS only)"
        required: false
        type: boolean
        default: false
      multi_arch:
        description: "Universal binary (macOS only)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Package formats (comma-separated: deb,appimage,rpm,zst)"
        required: false
        default: "deb"

jobs:
  build:
    name: ${{ inputs.platform }}
    runs-on: ${{ inputs.platform }}
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Build CLI
        run: pnpm run cli:build

      - name: Setup mold linker
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      - name: Rust cache restore
        uses: actions/cache/restore@v4.2.0
        id: cache_store
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}

      # FIX 1 - ICONE: Baixa o icone da URL como arquivo local em 256px para
      # garantir que o Tauri/Pake embuta corretamente no .deb (Linux exige
      # icone em arquivo local, nao URL, e minimo 128x128 para hicolor).
      - name: Download app icon
        if: runner.os != 'Windows' && inputs.icon != ''
        shell: bash
        run: |
          ICON_URL="${{ inputs.icon }}"
          # Se a URL for do icons8, forra tamanho 256 para melhor qualidade
          ICON_URL=$(echo "$ICON_URL"| sed 's/size=[0-9]*/size=256/g')
          echo "Downloading icon from: $ICON_URL"
          curl -fL "$ICON_URL" -o /tmp/app-icon.png
          # Valida que e uma imagem PNG valida
          file /tmp/app-icon.png
          echo "Icon downloaded successfully ($(wc -c < /tmp/app-icon.png) bytes)"
          echo "ICON_LOCAL_PATH=/tmp/app-icon.png" >> "$GITHUB_ENV"

      - name: Build App (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 25
        shell: bash
        run: |
          APP_NAME="${{ inputs.name }}"
          if [ "${{ runner.os }}" == "Linux" ]; then
            APP_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr -s ' ' '-')
            echo "Normalized Linux app name: $APP_NAME"
          fi
          echo "BUILD_APP_NAME=$APP_NAME" >> "$GITHUB_ENV"
          ARGS=("${{ inputs.url }}" "--name" "$APP_NAME")

          # FIX 1 - ICONE: usa arquivo local baixado em vez de URL direta
          if [ -n "${ICON_LOCAL_PATH:-}" ] && [ -f "$ICON_LOCAL_PATH" ]; then
            ARGS+=("--icon" "$ICON_LOCAL_PATH")
          elif [ -n "${{ inputs.icon }}" ]; then
            ARGS+=("--icon" "${{ inputs.icon }}")
          fi

          if [ -n "${{ inputs.width }}" ]; then
            ARGS+=("--width" "${{ inputs.width }}")
          fi

          if [ -n "${{ inputs.height }}" ]; then
            ARGS+=("--height" "${{ inputs.height }}")
          fi

          if [ -n "${{ inputs.min_width }}" ]; then
            ARGS+=("--min-width" "${{ inputs.min_width }}")
          fi

          if [ -n "${{ inputs.min_height }}" ]; then
            ARGS+=("--min-height" "${{ inputs.min_height }}")
          fi

          if [ -n "${{ inputs.app_version }}" ]; then
            ARGS+=("--app-version" "${{ inputs.app_version }}")
          fi

          if [ "${{ inputs.fullscreen }}" == "true" ]; then
            ARGS+=("--fullscreen")
          fi

          if [ "${{ inputs.hide_title_bar }}" == "true" ]; then
            ARGS+=("--hide-title-bar")
          fi

          if [ "${{ inputs.multi_arch }}" == "true" ]; then
            ARGS+=("--multi-arch")
          fi

          if [ -n "${{ inputs.targets }}" ] && [ "${{ runner.os }}" == "Linux" ]; then
            ARGS+=("--targets" "${{ inputs.targets }}")
          fi

          echo "Running: node dist/cli.js ${ARGS[@]}"
          node dist/cli.js "${ARGS[@]}"

      - name: Build App (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 25
        shell: pwsh
        run: |
          $args = "${{ inputs.url }}", "--name", "${{ inputs.name }}"
          echo "BUILD_APP_NAME=${{ inputs.name }}" >> $env:GITHUB_ENV

          if ("${{ inputs.icon }}" -ne "") {
            $args += "--icon", "${{ inputs.icon }}"
          }

          if ("${{ inputs.width }}" -ne "") {
            $args += "--width", "${{ inputs.width }}"
          }

          if ("${{ inputs.height }}" -ne "") {
            $args += "--height", "${{ inputs.height }}"
          }

          if ("${{ inputs.min_width }}" -ne "") {
            $args += "--min-width", "${{ inputs.min_width }}"
          }

          if ("${{ inputs.min_height }}" -ne "") {
            $args += "--min-height", "${{ inputs.min_height }}"
          }

          if ("${{ inputs.app_version }}" -ne "") {
            $args += "--app-version", "${{ inputs.app_version }}"
          }

          if ("${{ inputs.fullscreen }}" -eq "true") {
            $args += "--fullscreen"
          }

          if ("${{ inputs.hide_title_bar }}" -eq "true") {
            $args += "--hide-title-bar"
          }

          Write-Host "Running: node dist/cli.js $($args -join ' ')"
          node dist/cli.js $args

          git checkout -- src-tauri/Cargo.lock

      - name: List generated files
        if: always()
        shell: bash
        run: |
          echo "=== Files in workspace root matching app name ==="
          ls -la "${{ env.BUILD_APP_NAME }}"* 2>/dev/null || echo "No files found matching ${{ env.BUILD_APP_NAME }}*"
          echo "=== Full workspace root listing ==="
          ls -la
          echo "=== Searching recursively for built bundles ==="
          find . -maxdepth 6 \( -iname "*.deb" -o -iname "*.rpm" -o -iname "*.AppImage" -o -iname "*.dmg" -o -iname "*.msi" -o -iname "*.exe" -o -iname "*.zst" \) 2>/dev/null

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_APP_NAME }}-macOS
          path: ${{ env.BUILD_APP_NAME }}.dmg
          retention-days: 3

      - name: Upload DEB (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_APP_NAME }}-Linux-deb
          path: ${{ env.BUILD_APP_NAME }}.deb
          retention-days: 3
          if-no-files-found: warn

      # FIX 2 - TECLADO: Apos instalacao do .deb, o arquivo .desktop e
      # Patch do .desktop para corrigir digitacao nos campos de login.
      # Problema: WebKitGTK conflita com IBus/fcitx causando letras perdidas.
      # Solucao: GTK_IM_MODULE=xim forca XIM (metodo de entrada basico),
      # que funciona corretamente com a webview do Tauri no Linux.
      - name: Patch .desktop for keyboard fix (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DEB_FILE="${{ env.BUILD_APP_NAME }}.deb"
          if [ ! -f "$DEB_FILE" ]; then
            echo "DEB not found, skipping .desktop patch"
            exit 0
          fi

          echo "==> Patching .desktop inside $DEB_FILE..."
          WORK_DIR=$(mktemp -d)
          ORIG_DIR="$(pwd)"
          # Copia o .deb para o diretório de trabalho e entra nele
          cp "$DEB_FILE" "$WORK_DIR/"
          cd "$WORK_DIR"

          # Extrai o .deb (ar x só precisa do nome do arquivo, já estamos no WORK_DIR)
          ar x "${{ env.BUILD_APP_NAME }}.deb"
          mkdir -p data_extracted
          tar -xf data.tar* -C data_extracted

          # Encontra o .desktop
          DESKTOP_FILE=$(find data_extracted -name "*.desktop" | head -1)
          if [ -z "$DESKTOP_FILE" ]; then
            echo "No .desktop file found, skipping patch"
            cd "$ORIG_DIR" && rm -rf "$WORK_DIR"
            exit 0
          fi

          echo "==> Found: $DESKTOP_FILE"
          echo "--- BEFORE ---"
          cat "$DESKTOP_FILE"

          # Corrige a linha Exec= com python3 para evitar problemas de quoting no sed.
          # GTK_IM_MODULE=xim: usa XIM em vez de IBus/fcitx, corrigindo letras perdidas.
          python3 -c "
          import sys, re
          path = sys.argv[1]
          txt = open(path).read()
          # Remove patches anteriores para nao duplicar
          txt = re.sub(r'(?m)^Exec=(?:env\s+[A-Z_]+=\S+\s+)*', 'Exec=', txt)
          # Injeta as variaveis corretas
          txt = re.sub(r"(?m)^Exec=(.+)$", r"Exec=env GTK_IM_MODULE=xim XMODIFIERS=@im=none \1", txt)
          open(path, "w").write(txt)
          print("Patch OK")
          " -- "$DESKTOP_FILE"

          echo "--- AFTER ---"
          cat "$DESKTOP_FILE"

          # Reempacota data.tar (remove os tars antigos antes)
          rm -f data.tar.gz data.tar.xz data.tar.zst
          tar -czf data.tar.gz -C data_extracted .

          # Reempacota o .deb (debian-binary e control.tar* já estão no CWD após ar x)
          ar rcs "${{ env.BUILD_APP_NAME }}_patched.deb" debian-binary control.tar* data.tar.gz

          # Substitui o .deb original pelo corrigido
          cp "${{ env.BUILD_APP_NAME }}_patched.deb" "$ORIG_DIR/${{ env.BUILD_APP_NAME }}.deb"
          cd "$ORIG_DIR" && rm -rf "$WORK_DIR"
          echo "==> DEB patched successfully!"

      - name: Upload AppImage (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_APP_NAME }}-Linux-AppImage
          path: ${{ env.BUILD_APP_NAME }}.AppImage
          retention-days: 3
          if-no-files-found: warn

      - name: Upload RPM (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_APP_NAME }}-Linux-rpm
          path: ${{ env.BUILD_APP_NAME }}.rpm
          retention-days: 3
          if-no-files-found: warn

      - name: Upload ZST (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_APP_NAME }}-Linux-zst
          path: ${{ env.BUILD_APP_NAME }}-*.pkg.tar.zst
          retention-days: 3
          if-no-files-found: warn

      - name: Upload MSI (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_APP_NAME }}-Windows
          path: ${{ env.BUILD_APP_NAME }}.msi
          retention-days: 3

      - name: Rust cache store
        uses: actions/cache/save@v4.2.0
        if: steps.cache_store.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}
